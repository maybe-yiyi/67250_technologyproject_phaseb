<!DOCTYPE html>
<html>
    <head>
        <meta name="author" content="Yiyoung Liu">
        <meta name="keywords" content="Museum, Carnegie Mellon University,
                                       Information Systems">
        <meta name="description" content="MonoMuse website redesign project">
        <title>MonoMuse</title>
        <link rel="stylesheet" href="../static/style.css">
        <script src="../static/script.js" defer></script>
    </head>
    <body onload="addYear()">
        <header>
            <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
            <nav>
                <a href="../index.html">Home</a>
                <a href="explore.html">Explore</a>
                <a href="exhibitions.html">Exhibitions</a>
            </nav>
            <a href="checkout.html" class="big-button">Buy Tickets</a>
        </header>
        <div class="main">
            <div class="checkout-layout">
                <div class="ticket-section">
                    <h1 class="checkout-heading">Buy Tickets</h1>
                    <table class="ticket-table">
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th>Price</th>
                                <th>Details</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><span class="ticket-type">General</span></td>
                                <td><span class="ticket-price">$25</span></td>
                                <td class="ticket-details">Standard access for adults (ages 18–64)</td>
                            </tr>
                            <tr>
                                <td><span class="ticket-type">Student</span></td>
                                <td><span class="ticket-price">$10</span></td>
                                <td class="ticket-details">Student ID required</td>
                            </tr>
                            <tr>
                                <td><span class="ticket-type">Member</span></td>
                                <td><span class="ticket-price">$14</span></td>
                                <td class="ticket-details">Member ID required</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="form-section">
                    <h2 class="form-heading">Reserve Your Visit</h2>
                    <form class="checkout-form">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" placeholder="Full name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="ticket-type">Ticket Type</label>
                            <select id="ticket-type" name="ticket-type" required>
                                <option value="" disabled selected>Select a type</option>
                                <option value="general">General — $25</option>
                                <option value="student">Student — $10</option>
                                <option value="member">Member — $14</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="tickets">Quantity</label>
                            <input type="number" id="tickets" name="tickets" min="1" placeholder="1" required>
                        </div>
                        <input type="submit" value="Purchase Tickets" class="submit-btn">
                    </form>
                </div>
            </div>
        </div>
        <footer>
            <p id="copyYear"> MonoMuse. All Rights Reserved.</p>
        </footer>
    </body>
</html>
